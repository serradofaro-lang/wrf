<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteonube ⛅</title>
    <link rel="icon" type="image/png" href="logo_meteonube.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h2>Meteonube ⛅</h2>
                <div class="subtitle" id="last-updated">Cargando...</div>
            </div>



            <!-- Domain Selector -->
            <div class="control-group">
                <label>Dominio</label>
                <div class="toggle-group" id="domain-selector">
                    <!-- Buttons generated by JS -->
                </div>
            </div>

            <!-- Zoom Selector -->
            <div class="control-group" id="zoom-group">
                <label>Zoom</label>
                <select id="zoom-selector">
                    <option value="">Dominio Completo</option>
                </select>
            </div>

            <!-- Variable Selector -->
            <div class="control-group" id="var-group">
                <label>Variable</label>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <select id="var-selector" style="flex-grow: 1;"></select>
                    <label style="font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 0.3rem;">
                        <input type="checkbox" id="hide-variable-checkbox"> Ocultar
                    </label>
                </div>
            </div>



            <!-- Stations (Hidden by default) -->
            <div class="control-group hidden" id="station-group">
                <label>Despegue</label>
                <select id="station-selector"></select>
            </div>

            <!-- Overlays -->
            <div class="control-group" id="overlays-group">
                <label>Capas Meteorológicas</label>
                <div class="toggle-group" id="weather-layers">
                    <!-- Dynamic Exclusive Toggles will be here -->
                </div>

                <div class="checkbox-list" style="margin-top: 0.5rem;">
                    <label><input type="checkbox" id="toggle-takeoffs-names">Despegues</label>
                </div>
            </div>

            <div class="control-group" id="mode-group">
                <label>Modo Viento</label>
                <div class="toggle-group" id="mode-selector">
                    <button data-value="vector" class="active">Vectores</button>
                    <button data-value="barb">Barbas</button>
                </div>
            </div>

            <div class="status-panel" id="status-panel"></div>
        </div>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content -->
        <div class="viewer">
            <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Menu">☰</button>
            <!-- Controls -->
            <div class="timeline-controls">
                <button id="prev-btn">⏮</button>
                <select id="date-selector" class="timeline-date"></select>
                <span id="current-time-label" class="time-display">00:00</span>
                <button id="next-btn">⏭</button>
            </div>

            <!-- Map Container for Stacking Images -->
            <div class="image-container" id="map-container">
                <div class="loader" id="loader"></div>

                <!-- 1. Base Layers -->
                <img id="img-terrain" class="map-layer z-10" alt="Terrain">

                <!-- 2. Variable Layer -->
                <img id="img-variable" class="map-layer z-20" alt="Variable">
                <img id="img-vector" class="map-layer z-30 hidden" alt="Vectores">

                <!-- 3. Overlays -->
                <img id="img-roads" class="map-layer z-30" alt="Roads">
                <img id="img-rivers" class="map-layer z-30" alt="Rivers">
                <img id="img-ccaa" class="map-layer z-30" alt="CCAA">

                <!-- 4. Clouds/Rain (Dynamic Overlays) -->
                <!-- Dynamic layers added here by JS -->

                <!-- 5. Labels -->
                <img id="img-cities" class="map-layer z-50" alt="Cities">
                <img id="img-peaks" class="map-layer z-50" alt="Peaks">
                <img id="img-takeoffs" class="map-layer z-50" alt="Takeoffs">
                <img id="img-takeoffs-names" class="map-layer z-60 hidden" alt="Takeoffs Names">

            </div>

            <!-- Scale Bar (Separate from map to not zoom incorrectly or obscure) -->
            <div class="scale-container hidden" id="scale-container">
                <img id="img-scale" alt="Scale">
            </div>

            <!-- Special Views Overlay (Sounding/Meteogram) -->
            <div id="overlay-container" class="overlay-container hidden">
                <img id="img-sounding" class="overlay-image hidden" alt="Sounding">
                <img id="img-meteogram" class="overlay-image hidden" alt="Meteogram">
            </div>




        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
